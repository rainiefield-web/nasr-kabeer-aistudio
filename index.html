<html lang="en">
  <head>

    <meta name="robots" content="index,follow" />

    <title>Nasr Kabeer Aluminum Co., Ltd.</title>
    <link rel="icon" href="/site-assets/favicon.png" type="image/png">
    <link rel="preload" as="image" href="/hero-background-wide.png" media="(min-width: 768px)" fetchpriority="high">
    <link rel="preload" as="image" href="/hero-profile-mobile.png" media="(max-width: 767px)" fetchpriority="high">
    <link href="/brochure-fonts/brochure-fonts.css" rel="stylesheet">
    <link href="/site-fonts/cairo-fonts.css" rel="stylesheet">
    <style>
      html {
        scroll-behavior: smooth;
        scroll-padding-top: 80px;
      }
      body {
        background-color: #F3F4F6;
        color: #1F2937;
      }
      .clip-path-slant {
        clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #111827;
      }
      ::-webkit-scrollbar-thumb {
        background: #4B5563;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #009FE3;
      }
      .metal-cta,
      .metal-cta-secondary {
        position: relative;
        isolation: isolate;
        overflow: hidden;
        border: 0;
        background-blend-mode: normal;
        will-change: transform, box-shadow;
        transform: translate3d(0, 0, 0) scale(1);
        backface-visibility: hidden;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.30),
          inset 0 -12px 24px rgba(42, 52, 58, 0.12),
          0 14px 30px rgba(0, 0, 0, 0.22);
        transition:
          transform 760ms cubic-bezier(0.16, 1, 0.3, 1),
          box-shadow 760ms cubic-bezier(0.16, 1, 0.3, 1),
          background-color 760ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      .metal-cta {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0) 38%),
          linear-gradient(135deg, #cdd4d8 0%, #b4bec5 46%, #a9b3ba 100%);
        color: #101820;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.22);
      }
      .metal-cta-secondary {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0) 40%),
          linear-gradient(135deg, rgba(156, 168, 176, 0.38), rgba(98, 114, 124, 0.52) 100%);
        color: #f4f7f8;
        text-shadow: 0 1px 0 rgba(0, 0, 0, 0.38);
      }
      .metal-cta::before,
      .metal-cta-secondary::before {
        content: none;
      }
      .metal-cta::after,
      .metal-cta-secondary::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -2;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0) 46%, rgba(0, 0, 0, 0.06) 100%);
        pointer-events: none;
      }
      .metal-cta:hover,
      .metal-cta-secondary:hover {
        transform: translate3d(0, -1.5px, 0) scale(1.012);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.34),
          inset 0 -12px 24px rgba(42, 52, 58, 0.10),
          0 18px 38px rgba(0, 0, 0, 0.25);
      }
      .metal-cta > *,
      .metal-cta-secondary > * {
        position: relative;
        z-index: 1;
      }
    </style>

{

  }
}
</script>

</html>
