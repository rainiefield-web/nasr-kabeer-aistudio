    <linearGradient id="alxSilver" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.48" stop-color="#c9d3dc"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
